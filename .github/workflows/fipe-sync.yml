# Sync mensal da FIPE — a tabela muda todo mês; este job renova o
# preço dos códigos em uso e o snapshot dos veículos.
# Secrets necessários no repo: SUPABASE_URL, SUPABASE_SECRET_KEY.
name: fipe-sync

on:
  schedule:
    # dia 2 de cada mês, 06:00 UTC (a FIPE publica na virada do mês)
    - cron: "0 6 2 * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/fipe-sync.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
