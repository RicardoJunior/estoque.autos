version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/app/backend
    overwrite: true

permissions:
  - object: /home/ec2-user/app/backend
    owner: ec2-user
    group: ec2-user
    type:
      - directory
      - file

hooks:
  BeforeInstall:
    - location: codedeploy/before-install.sh
      timeout: 60
      runas: ec2-user

  AfterInstall:
    - location: codedeploy/after-install.sh
      timeout: 120
      runas: ec2-user

  ApplicationStart:
    - location: codedeploy/start.sh
      timeout: 30
      runas: ec2-user

  ValidateService:
    - location: codedeploy/validate.sh
      timeout: 30
      runas: ec2-user
